name: Start application
description: Once done, the application is ready on `localhost:80`.

runs:
  using: composite
  steps:
    - name: Get frontend build
      uses: actions/download-artifact@v4
      with:
        name: frontend-build
        path: frontend/dist
    - name: Get samples
      uses: actions/download-artifact@v4
      with:
        name: samples
        path: frontend/public/data
    - name: Start containers
      run: |
        export COUCHDB_USER="thbc"
        export COUCHDB_PASSWORD="thbc"
        docker compose up --detach
      shell: bash
    - name: Check backend ports
      run: docker compose ps
      shell: bash
    - name: Debug backend logs
      run: |
        docker compose logs -f backend
      shell: bash
    - name: Test backend from container
      run: |
        docker compose exec backend curl -v http://localhost:3000/
      shell: bash
    - name: Wait for frontend
      uses: docker://benel/wait-for-response:1
      with:
        args: http://localhost/ 200 30000 500
    - name: Wait for backend
      run: |
        for i in {1..60}; do
          if curl -sf http://localhost:3000/ > /dev/null; then
            echo "Backend ready"
            break
          fi
          echo "Waiting for backend..."
          sleep 1
        done
      shell: bash
    - name: Wait for couchdb
      uses: docker://benel/wait-for-response:1
      with:
        args: http://localhost:5984/greentube/_all_docs?limit=10 200 30000 500
